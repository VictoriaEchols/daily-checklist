<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purr Planner</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Purr Planner">
<meta name="theme-color" content="#FBF6EF">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Jost:wght@300;400;500;600&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#FBF6EF;--card:#FFFFFF;--ink:#3A2330;--soft:#6E5460;--faint:#9C8893;
    --gold:#C2A05B;--gold-deep:#9C7B36;--blush:#F5DFE9;--line:rgba(194,160,91,0.20);
    --ui:'Jost',-apple-system,BlinkMacSystemFont,sans-serif;
    --display:'Playfair Display',Georgia,serif;--script:'Pinyon Script',cursive;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  body{font-family:var(--ui);color:var(--ink);min-height:100vh;padding:28px 18px 110px;
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(ellipse 60% 30% at 80% 0%, rgba(245,223,233,.55) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 0% 100%, rgba(230,210,162,.18) 0%, transparent 55%),
      var(--bg);}
  .wrap{max-width:560px;margin:0 auto}

  header{text-align:center;margin-bottom:1.4rem}
  .greeting{font-size:.72rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:.4rem;font-weight:500}
  header h1{font-family:var(--script);font-weight:400;font-size:2.9rem;line-height:1;color:var(--gold-deep);margin-bottom:.4rem}
  .today-date{font-family:var(--display);font-size:1.12rem;color:var(--ink);font-weight:500}
  .today-day{color:var(--soft);font-size:.9rem;margin-top:.1rem}

  .progress-wrap{margin:1.3rem auto 1.8rem;max-width:420px}
  .progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem}
  .progress-label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--faint)}
  .progress-count{font-family:var(--display);font-size:1rem;color:var(--gold-deep);font-weight:600}
  .bar{height:8px;border-radius:99px;background:rgba(194,160,91,.16);overflow:hidden}
  .bar-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#E6D2A2,var(--gold));transition:width .5s var(--ease)}
  .done-msg{text-align:center;font-family:var(--display);font-style:italic;color:var(--gold-deep);font-size:1.05rem;margin-top:.9rem;display:none}
  .done-msg.show{display:block}

  .cat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:1.2rem 1.2rem .55rem;margin-bottom:1.05rem;box-shadow:0 8px 26px -18px rgba(142,78,104,.22)}
  .cat-head{display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .cat-head h2{font-weight:600;font-size:.76rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink)}

  .task{display:flex;align-items:flex-start;gap:.8rem;padding:.65rem 0;border-top:1px solid rgba(58,35,48,.05)}
  .cat .task:first-of-type{border-top:none}
  .box{width:23px;height:23px;border-radius:7px;border:2px solid rgba(194,160,91,.5);flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease);background:#fff;cursor:pointer}
  .box svg{width:13px;height:13px;opacity:0;transform:scale(.5);transition:all .25s var(--ease)}
  .task-body{flex:1;cursor:pointer;min-width:0}
  .task-label{font-size:1rem;color:var(--ink);line-height:1.35;transition:color .25s var(--ease)}
  .task-note{font-size:.78rem;color:var(--faint);margin-top:.12rem;line-height:1.4}
  .task-edit{flex:none;background:none;border:none;color:var(--faint);font-size:1rem;cursor:pointer;padding:2px 6px;opacity:.55;transition:opacity .2s}
  .task-edit:hover{opacity:1;color:var(--gold-deep)}
  .task.checked .box{background:var(--gold);border-color:var(--gold)}
  .task.checked .box svg{opacity:1;transform:scale(1)}
  .task.checked .task-label{color:var(--faint);text-decoration:line-through;text-decoration-color:rgba(194,160,91,.6)}

  .section-title{text-align:center;font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--faint);margin:1.9rem 0 1rem}
  .upkeep .task-note{color:var(--gold-deep)}
  .upkeep-next{color:var(--faint);font-size:.74rem}

  /* Goals */
  .goal{display:flex;align-items:center;gap:.7rem;padding:.6rem 0;border-top:1px solid rgba(58,35,48,.05)}
  .cat .goal:first-of-type{border-top:none}
  .goal-label{flex:1;font-size:.98rem;color:var(--ink);min-width:0}
  .goal.done .goal-label{color:var(--faint);text-decoration:line-through;text-decoration-color:rgba(194,160,91,.6)}
  .goal-btn{flex:none;border:1px solid var(--line);background:#fff;color:var(--gold-deep);border-radius:99px;font-family:var(--ui);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;padding:.4rem .7rem;cursor:pointer;transition:all .2s}
  .goal-btn:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
  .goal-del{flex:none;background:none;border:none;color:var(--faint);cursor:pointer;font-size:1rem;padding:2px 5px;opacity:.5}
  .goal-del:hover{opacity:1;color:#b5566f}
  .add-row{display:flex;gap:.5rem;margin:.7rem 0 .3rem}
  .add-row input{flex:1;border:1px solid var(--line);border-radius:10px;padding:.6rem .8rem;font-family:var(--ui);font-size:.92rem;color:var(--ink);background:#fff}
  .add-row input:focus{outline:none;border-color:var(--gold)}
  .add-row button{border:none;background:var(--gold);color:#fff;border-radius:10px;padding:0 1rem;font-family:var(--ui);font-weight:500;cursor:pointer}

  /* Floating add */
  .fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#DCC07F,#C5A45F);color:var(--ink);border:none;border-radius:99px;padding:.95rem 1.8rem;font-family:var(--ui);font-weight:600;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;box-shadow:0 12px 30px -10px rgba(194,160,91,.6);cursor:pointer;z-index:40}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(58,35,48,.45);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:60;padding:0}
  .overlay.show{display:flex}
  .modal{background:var(--bg);width:100%;max-width:560px;border-radius:24px 24px 0 0;padding:1.6rem 1.4rem 2rem;max-height:90vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(58,35,48,.25)}
  @media(min-width:600px){.overlay{align-items:center}.modal{border-radius:24px}}
  .modal h3{font-family:var(--display);font-size:1.5rem;color:var(--ink);margin-bottom:1.1rem;text-align:center}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:.4rem;font-weight:500}
  .field input[type=text],.field select{width:100%;border:1px solid var(--line);border-radius:12px;padding:.75rem .9rem;font-family:var(--ui);font-size:1rem;color:var(--ink);background:#fff}
  .field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
  .chips{display:flex;flex-wrap:wrap;gap:.45rem}
  .chip{border:1px solid var(--line);background:#fff;border-radius:99px;padding:.45rem .8rem;font-size:.82rem;color:var(--soft);cursor:pointer;user-select:none;transition:all .2s}
  .chip.on{background:var(--gold);color:#fff;border-color:var(--gold)}
  .num-input{display:flex;align-items:center;gap:.5rem}
  .num-input input{width:80px}
  .modal-actions{display:flex;gap:.7rem;margin-top:1.4rem}
  .modal-actions button{flex:1;border:none;border-radius:99px;padding:.9rem;font-family:var(--ui);font-weight:600;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
  .btn-save{background:linear-gradient(135deg,#DCC07F,#C5A45F);color:var(--ink)}
  .btn-cancel{background:#fff;border:1px solid var(--line)!important;color:var(--soft)}
  .btn-delete{background:none!important;color:#b5566f;flex:0 0 auto!important;padding:.9rem 1rem}
  .hidden{display:none!important}

  footer{text-align:center;margin-top:1.6rem;color:var(--faint);font-size:.72rem;letter-spacing:.06em}
  footer .gem{display:inline-block;width:6px;height:6px;background:var(--gold);transform:rotate(45deg);margin:0 .5rem;vertical-align:middle}
  @media(max-width:420px){header h1{font-size:2.5rem}.cat{padding:1rem .95rem .5rem}}

  .cats{max-width:240px;margin:0 auto;display:block}
  .cats svg{width:100%;height:auto;display:block}
  header h1.brand{margin:.2rem 0 .5rem}
  .paw{width:17px;height:17px;flex:none}

  .logo{display:block;width:100%;max-width:290px;height:auto;margin:0 auto .4rem}
  /* ---- match logo: purple + gold + cream ---- */
  body{background:
    radial-gradient(ellipse 60% 30% at 82% 0%, rgba(150,110,190,.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 0% 100%, rgba(194,160,91,.16) 0%, transparent 55%),
    #FBF6EF}
  .greeting{color:#6B3FA0}
  .progress-count{color:#6B3FA0}
  .bar-fill{background:linear-gradient(90deg,#E6D2A2,#8857B8 70%,#6B3FA0)}
  .done-msg{color:#6B3FA0}
  .task.checked .box{background:#6B3FA0;border-color:#6B3FA0}
  .task.checked .task-label{text-decoration-color:rgba(107,63,160,.55)}
  .box{border-color:rgba(107,63,160,.45)}
  .fab{background:linear-gradient(135deg,#7E50B0,#5E3687);color:#fff}
  .goal-btn:hover,.add-row button{background:#6B3FA0}
  .goal-btn{color:#6B3FA0}
  .help-link,.pet-type{}
  .weekstrip{display:flex;justify-content:center;gap:.3rem;margin:.7rem auto 0;max-width:360px}
  .wd{flex:1;min-width:0;border:none;background:transparent;cursor:pointer;border-radius:14px;padding:.4rem .1rem;display:flex;flex-direction:column;align-items:center;gap:.12rem;font-family:var(--ui);transition:background .2s}
  .wd .l{font-size:.58rem;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
  .wd .n{font-size:.92rem;color:var(--ink);font-weight:500;line-height:1}
  .wd.today .n{color:#6B3FA0;font-weight:700}
  .wd.sel{background:#6B3FA0}
  .wd.sel .l,.wd.sel .n{color:#fff}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="logo" src="logo.png" alt="Purr Planner">
    <div class="greeting" id="greeting">Good morning, Tori</div>
    <div class="today-date" id="date"></div>
    <div class="today-day" id="weekday"></div>
    <div class="weekstrip" id="weekstrip"></div>
  </header>

  <div class="progress-wrap">
    <div class="progress-top">
      <span class="progress-label">Today's progress</span>
      <span class="progress-count" id="count">0 / 0</span>
    </div>
    <div class="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="done-msg" id="doneMsg">Everything done for today. Beautiful work. 💛</div>
  </div>

  <main id="today"></main>

  <div id="upkeepWrap"></div>
  <div id="goalsWrap"></div>

  <footer><span class="gem"></span> Tap a task to check it · resets each day <span class="gem"></span></footer>
</div>

<button class="fab" id="fab">+ Add task</button>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">New task</h3>
    <div class="field">
      <label>What is it?</label>
      <input type="text" id="fTitle" placeholder="e.g. Take iron">
    </div>
    <div class="field">
      <label>Category</label>
      <select id="fCat"></select>
    </div>
    <div class="field">
      <label>Repeat</label>
      <select id="fRepeat">
        <option value="daily">Every day</option>
        <option value="weekdays">Certain days of the week</option>
        <option value="everyDays">Every set number of days</option>
        <option value="everyMonths">Every set number of months</option>
        <option value="once">Just once</option>
      </select>
    </div>
    <div class="field hidden" id="fieldDays">
      <label>Which days?</label>
      <div class="chips" id="dayChips"></div>
    </div>
    <div class="field hidden" id="fieldEveryDays">
      <label>Every how many days?</label>
      <div class="num-input">every <input type="text" id="fEveryDays" inputmode="numeric" value="2"> days</div>
    </div>
    <div class="field hidden" id="fieldEveryMonths">
      <label>Every how many months?</label>
      <div class="num-input">every <input type="text" id="fEveryMonths" inputmode="numeric" value="6"> months</div>
    </div>
    <div class="field">
      <label>Note (optional)</label>
      <input type="text" id="fNote" placeholder="e.g. before bed">
    </div>
    <div class="modal-actions">
      <button class="btn-delete hidden" id="btnDelete">Delete</button>
      <button class="btn-cancel" id="btnCancel">Cancel</button>
      <button class="btn-save" id="btnSave">Save</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  function pawIcon(c){return "<svg class=\"paw\" viewBox=\"0 0 24 24\" fill=\""+c+"\"><ellipse cx=\"12\" cy=\"15.5\" rx=\"6\" ry=\"5\"/><ellipse cx=\"5.5\" cy=\"9.5\" rx=\"2.4\" ry=\"3.1\"/><ellipse cx=\"10\" cy=\"6.5\" rx=\"2.5\" ry=\"3.3\"/><ellipse cx=\"14\" cy=\"6.5\" rx=\"2.5\" ry=\"3.3\"/><ellipse cx=\"18.5\" cy=\"9.5\" rx=\"2.4\" ry=\"3.1\"/></svg>";}

  var CATEGORIES = [
    {name:'Spiritual',color:'#C2A05B'},
    {name:'Vitamins',color:'#C77BA3'},
    {name:'Movement & Diet',color:'#9CB29A'},
    {name:'Home',color:'#D6A08F'},
    {name:'Teeth',color:'#A9C2D1'},
    {name:'Skincare',color:'#C8B6D6'},
    {name:'Hobbies',color:'#E3B091'},
    {name:'Pets',color:'#CBA678'},
    {name:'Upkeep',color:'#B79B86'},
    {name:'Health',color:'#B58AA0'}
  ];
  function catColor(n){for(var i=0;i<CATEGORIES.length;i++)if(CATEGORIES[i].name===n)return CATEGORIES[i].color;return '#C2A05B';}

  var now=new Date(), dow=now.getDay();
  var dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var dayAbbr=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  function pad(n){return n<10?'0'+n:''+n;}
  function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  var todayStr=ymd(now);
  var viewDate=new Date(now), viewDow=dow, viewKey=todayStr;
  var dayMini=['Su','Mo','Tu','We','Th','Fr','Sa'];
  function parseYmd(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
  function daysBetween(a,b){return Math.round((parseYmd(ymd(b))-parseYmd(ymd(a)))/86400000);}
  function addMonths(d,n){var x=new Date(d.getTime());x.setMonth(x.getMonth()+n);return x;}

  // ---- Default seed ----
  function defaults(){ return {tasks:[],goals:[],seq:0,gseq:0,v:DATA_VERSION}; }

  // ---- Storage ----
  var DATA, DONE, DATA_VERSION=4;
  function load(){
    try{ var m=(location.hash||"").match(/d=([^&]+)/); if(m && !localStorage.getItem("tori-routine-data")){ var imp=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1]))))); if(imp&&imp.tasks) localStorage.setItem("tori-routine-data",JSON.stringify(imp)); } }catch(e){}
    try{DATA=JSON.parse(localStorage.getItem('tori-routine-data'));}catch(e){DATA=null;}
    try{DONE=JSON.parse(localStorage.getItem('tori-routine-done'))||{};}catch(e){DONE={};}
    if(!DATA||!DATA.tasks||!DATA.v||DATA.v<DATA_VERSION){DATA=defaults();save();DONE={};saveDone();}
  }
  function save(){localStorage.setItem('tori-routine-data',JSON.stringify(DATA));}
  function saveDone(){localStorage.setItem('tori-routine-done',JSON.stringify(DONE));}

  // ---- Recurrence ----
  function dueToday(t){
    if(t.rep==='daily')return true;
    if(t.rep==='weekdays')return (t.days||[]).indexOf(viewDow)!==-1;
    if(t.rep==='everyDays'){var n=Math.max(1,+t.n||1);var s=t.start?parseYmd(t.start):now;return daysBetween(s,viewDate)%n===0;}
    return false; // everyMonths & once handled separately
  }
  function upkeepDue(t){
    if(t.rep==='everyMonths'){var base=t.lastDone?parseYmd(t.lastDone):(t.start?parseYmd(t.start):now);var next=addMonths(base,Math.max(1,+t.n||1));return parseYmd(ymd(now))>=parseYmd(ymd(next));}
    if(t.rep==='once')return !t.done;
    return false;
  }
  function nextDueStr(t){
    if(t.rep!=='everyMonths')return '';
    var base=t.lastDone?parseYmd(t.lastDone):(t.start?parseYmd(t.start):now);
    var next=addMonths(base,Math.max(1,+t.n||1));
    return monthNames[next.getMonth()].slice(0,3)+' '+next.getDate()+', '+next.getFullYear();
  }
  function dynNote(t){
    if(!t.dynamicSkin)return t.note||'';
    return (viewDow===1||viewDow===4)
      ? "Paula's Choice BHA · Byoma Milky Toner · Mary & May Eye Cream · Byoma Gel Cream"
      : "Byoma Milky Toner · Anua Azelaic Acid · Mary & May Eye Cream · Byoma Gel Cream";
  }

  function doneKey(id){return id+':'+viewKey;}
  function isDone(id){return !!DONE[doneKey(id)];}
  function setDoneState(id,v){if(v)DONE[doneKey(id)]=1;else delete DONE[doneKey(id)];saveDone();}

  // ---- Render ----
  var todayEl=document.getElementById('today');
  var upkeepEl=document.getElementById('upkeepWrap');
  var goalsEl=document.getElementById('goalsWrap');

  function checkSvg(){return '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
  function esc(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function render(){
    todayEl.innerHTML='';upkeepEl.innerHTML='';goalsEl.innerHTML='';
    var dailyIds=[];

    // group due-today tasks by category order
    CATEGORIES.forEach(function(c){
      var list=DATA.tasks.filter(function(t){return t.cat===c.name && dueToday(t);});
      if(!list.length)return;
      var card=document.createElement('section');card.className='cat';
      card.innerHTML='<div class="cat-head">'+pawIcon(c.color)+'<h2>'+esc(c.name)+'</h2></div>';
      list.forEach(function(t){
        dailyIds.push(t.id);
        var note=dynNote(t);
        var row=document.createElement('div');row.className='task'+(isDone(t.id)?' checked':'');
        row.innerHTML='<span class="box">'+checkSvg()+'</span>'+
          '<div class="task-body"><div class="task-label">'+esc(t.title)+'</div>'+(note?'<div class="task-note">'+esc(note)+'</div>':'')+'</div>'+
          '<button class="task-edit" title="Edit">✎</button>';
        row.querySelector('.box').addEventListener('click',function(){toggle(t.id,row);});
        row.querySelector('.task-body').addEventListener('click',function(){toggle(t.id,row);});
        row.querySelector('.task-edit').addEventListener('click',function(e){e.stopPropagation();openModal(t);});
        card.appendChild(row);
      });
      todayEl.appendChild(card);
    });

    // upkeep / due now (everyMonths + once) — only on today's view
    var due=(viewKey===todayStr)?DATA.tasks.filter(function(t){return (t.rep==='everyMonths'||t.rep==='once') && upkeepDue(t);}):[];
    if(due.length){
      var wrap=document.createElement('div');wrap.className='upkeep';
      wrap.innerHTML='<div class="section-title">Due now · upkeep</div>';
      var card=document.createElement('section');card.className='cat';
      card.innerHTML='<div class="cat-head"><svg class="paw" viewBox="0 0 24 24" fill="#B79B86"><ellipse cx="12" cy="15.5" rx="6" ry="5"/><ellipse cx="5.5" cy="9.5" rx="2.4" ry="3.1"/><ellipse cx="10" cy="6.5" rx="2.5" ry="3.3"/><ellipse cx="14" cy="6.5" rx="2.5" ry="3.3"/><ellipse cx="18.5" cy="9.5" rx="2.4" ry="3.1"/></svg><h2>Time to do</h2></div>';
      due.forEach(function(t){
        var row=document.createElement('div');row.className='task';
        row.innerHTML='<span class="box">'+checkSvg()+'</span>'+
          '<div class="task-body"><div class="task-label">'+esc(t.title)+'</div><div class="task-note">'+(t.note?esc(t.note):esc(t.cat))+(t.rep==='everyMonths'?' · every '+t.n+' month'+(t.n>1?'s':''):' · one time')+'</div></div>'+
          '<button class="task-edit" title="Edit">✎</button>';
        row.querySelector('.box').addEventListener('click',function(){completeUpkeep(t);});
        row.querySelector('.task-body').addEventListener('click',function(){completeUpkeep(t);});
        row.querySelector('.task-edit').addEventListener('click',function(e){e.stopPropagation();openModal(t);});
        card.appendChild(row);
      });
      wrap.appendChild(card);upkeepEl.appendChild(wrap);
    }

    // goals on standby
    var gwrap=document.createElement('div');
    gwrap.innerHTML='<div class="section-title">Goals on standby</div>';
    var gcard=document.createElement('section');gcard.className='cat';
    gcard.innerHTML='<div class="cat-head"><svg class="paw" viewBox="0 0 24 24" fill="#C2A05B"><ellipse cx="12" cy="15.5" rx="6" ry="5"/><ellipse cx="5.5" cy="9.5" rx="2.4" ry="3.1"/><ellipse cx="10" cy="6.5" rx="2.5" ry="3.3"/><ellipse cx="14" cy="6.5" rx="2.5" ry="3.3"/><ellipse cx="18.5" cy="9.5" rx="2.4" ry="3.1"/></svg><h2>When you\'re ready</h2></div>';
    DATA.goals.forEach(function(g){
      var row=document.createElement('div');row.className='goal'+(g.done?' done':'');
      row.innerHTML='<span class="goal-label">'+esc(g.title)+'</span>'+
        '<button class="goal-btn">Make task</button>'+
        '<button class="goal-del" title="Remove">✕</button>';
      row.querySelector('.goal-btn').addEventListener('click',function(){promote(g);});
      row.querySelector('.goal-del').addEventListener('click',function(){DATA.goals=DATA.goals.filter(function(x){return x.id!==g.id;});save();render();});
      gcard.appendChild(row);
    });
    var addRow=document.createElement('div');addRow.className='add-row';
    addRow.innerHTML='<input type="text" id="newGoal" placeholder="Add a goal…"><button id="addGoalBtn">Add</button>';
    gcard.appendChild(addRow);
    gwrap.appendChild(gcard);goalsEl.appendChild(gwrap);
    addRow.querySelector('#addGoalBtn').addEventListener('click',addGoal);
    addRow.querySelector('#newGoal').addEventListener('keydown',function(e){if(e.key==='Enter')addGoal();});

    updateProgress(dailyIds);
    window._dailyIds=dailyIds;
  }

  function toggle(id,row){
    var on=!isDone(id);setDoneState(id,on);
    row.classList.toggle('checked',on);
    updateProgress(window._dailyIds);
  }
  function completeUpkeep(t){
    if(t.rep==='everyMonths'){t.lastDone=todayStr;}
    else if(t.rep==='once'){t.done=true;}
    save();render();
  }
  function addGoal(){
    var inp=document.getElementById('newGoal');var v=(inp.value||'').trim();if(!v)return;
    DATA.goals.push({id:'g'+(DATA.gseq++),title:v});save();render();
  }
  function promote(g){
    // open the add-task modal prefilled with the goal title; remove goal on save
    openModal(null,g.title,g.id);
  }

  function updateProgress(ids){
    var total=ids.length, done=ids.filter(isDone).length;
    document.getElementById('count').textContent=done+' / '+total;
    document.getElementById('barFill').style.width=total?(done/total*100)+'%':'0%';
    document.getElementById('doneMsg').classList.toggle('show',total>0&&done===total);
  }

  // ---- Modal (add / edit) ----
  var overlay=document.getElementById('overlay');
  var editing=null, fromGoalId=null;
  var fTitle=document.getElementById('fTitle'),fCat=document.getElementById('fCat'),
      fRepeat=document.getElementById('fRepeat'),fNote=document.getElementById('fNote'),
      fEveryDays=document.getElementById('fEveryDays'),fEveryMonths=document.getElementById('fEveryMonths');
  var selectedDays=[];

  CATEGORIES.forEach(function(c){var o=document.createElement('option');o.value=c.name;o.textContent=c.name;fCat.appendChild(o);});
  var chipsEl=document.getElementById('dayChips');
  dayAbbr.forEach(function(d,i){var ch=document.createElement('span');ch.className='chip';ch.textContent=d;ch.addEventListener('click',function(){var k=selectedDays.indexOf(i);if(k===-1)selectedDays.push(i);else selectedDays.splice(k,1);ch.classList.toggle('on');});chipsEl.appendChild(ch);});

  function refreshRepeatFields(){
    var v=fRepeat.value;
    document.getElementById('fieldDays').classList.toggle('hidden',v!=='weekdays');
    document.getElementById('fieldEveryDays').classList.toggle('hidden',v!=='everyDays');
    document.getElementById('fieldEveryMonths').classList.toggle('hidden',v!=='everyMonths');
  }
  fRepeat.addEventListener('change',refreshRepeatFields);

  function openModal(task,prefillTitle,goalId){
    editing=task||null; fromGoalId=goalId||null;
    document.getElementById('modalTitle').textContent=task?'Edit task':'New task';
    document.getElementById('btnDelete').classList.toggle('hidden',!task);
    selectedDays=[];
    Array.prototype.forEach.call(chipsEl.children,function(ch){ch.classList.remove('on');});
    if(task){
      fTitle.value=task.title;fCat.value=task.cat;fRepeat.value=task.rep;
      fNote.value=task.dynamicSkin?'':(task.note||'');
      if(task.rep==='weekdays'){selectedDays=(task.days||[]).slice();selectedDays.forEach(function(i){chipsEl.children[i].classList.add('on');});}
      if(task.rep==='everyDays')fEveryDays.value=task.n||2;
      if(task.rep==='everyMonths')fEveryMonths.value=task.n||6;
    }else{
      fTitle.value=prefillTitle||'';fCat.value=prefillTitle?'Health':'Spiritual';fRepeat.value=prefillTitle?'once':'daily';fNote.value='';fEveryDays.value=2;fEveryMonths.value=6;
    }
    refreshRepeatFields();
    overlay.classList.add('show');
    if(!task)setTimeout(function(){fTitle.focus();},80);
  }
  function closeModal(){overlay.classList.remove('show');editing=null;fromGoalId=null;}

  document.getElementById('btnCancel').addEventListener('click',closeModal);
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeModal();});
  document.getElementById('fab').addEventListener('click',function(){openModal(null);});

  document.getElementById('btnSave').addEventListener('click',function(){
    var title=(fTitle.value||'').trim();if(!title){fTitle.focus();return;}
    var obj=editing||{id:'t'+(DATA.seq++)};
    obj.title=title;obj.cat=fCat.value;obj.rep=fRepeat.value;
    var note=(fNote.value||'').trim();obj.note=note;
    if(editing&&editing.dynamicSkin)obj.dynamicSkin=true;
    delete obj.days;delete obj.n;
    if(obj.rep==='weekdays')obj.days=selectedDays.slice().sort();
    if(obj.rep==='everyDays'){obj.n=Math.max(1,parseInt(fEveryDays.value,10)||1);obj.start=obj.start||todayStr;}
    if(obj.rep==='everyMonths'){obj.n=Math.max(1,parseInt(fEveryMonths.value,10)||1);if(!editing)obj.start=todayStr;}
    if(obj.rep==='once'&&!editing)obj.done=false;
    if(!editing)DATA.tasks.push(obj);
    if(fromGoalId)DATA.goals=DATA.goals.filter(function(x){return x.id!==fromGoalId;});
    save();closeModal();render();
  });
  document.getElementById('btnDelete').addEventListener('click',function(){
    if(editing){DATA.tasks=DATA.tasks.filter(function(x){return x.id!==editing.id;});save();closeModal();render();}
  });

  // ---- Week strip + day view ----
  var stripEl=document.getElementById('weekstrip');
  function weekDates(){
    var sun=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow);
    var arr=[];for(var i=0;i<7;i++){arr.push(new Date(sun.getFullYear(),sun.getMonth(),sun.getDate()+i));}return arr;
  }
  function buildStrip(){
    stripEl.innerHTML='';
    weekDates().forEach(function(d){
      var b=document.createElement('button');b.className='wd';
      if(ymd(d)===todayStr)b.classList.add('today');
      if(ymd(d)===viewKey)b.classList.add('sel');
      b.innerHTML='<span class="l">'+dayMini[d.getDay()]+'</span><span class="n">'+d.getDate()+'</span>';
      b.addEventListener('click',function(){setView(d);});
      stripEl.appendChild(b);
    });
  }
  function updateHeaderForView(){
    document.getElementById('date').textContent=monthNames[viewDate.getMonth()]+' '+viewDate.getDate()+', '+viewDate.getFullYear();
    document.getElementById('weekday').textContent=(viewKey===todayStr?'Today · ':'')+dayNames[viewDow];
    var pl=document.querySelector('.progress-label');if(pl)pl.textContent=(viewKey===todayStr?"Today's progress":dayNames[viewDow]+"'s list");
  }
  function setView(d){
    viewDate=d;viewDow=d.getDay();viewKey=ymd(d);
    updateHeaderForView();buildStrip();render();
  }

  // ---- Header ----
  var hr=now.getHours();
  document.getElementById('greeting').textContent=hr<12?'Good morning, Tori':hr<17?'Good afternoon, Tori':'Good evening, Tori';
  updateHeaderForView();buildStrip();
  load();render();
})();
</script>
</body>
</html>
